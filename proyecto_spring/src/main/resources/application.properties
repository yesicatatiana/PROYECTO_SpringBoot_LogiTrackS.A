spring.application.name=proyecto_spring

<dependencies>
<!-- Dependencia del conector JDBC para MySQL -->

<dependency>
<groupId>mysql</groupId>
<artifactId>mysql-connector-java</artifactId>
<version>8.0.26</version> <!-- La versión puede ajustarse según necesidad -->
</dependency>

</dependencies>

# Configuración de la conexión a MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/proyecto_spring
spring.datasource.username=root
spring.datasource.password=alejo2707
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

